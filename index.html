<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>테트리스</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="game-container">
    <header class="game-header">
      <h1>테트리스</h1>
    </header>

    <main class="game-main">
      <section class="board-section">
        <div class="board-wrapper">
          <div id="game-board" class="game-board" aria-label="게임 보드"></div>
          <div id="game-over" class="game-over hidden" aria-live="polite">
            <p class="game-over-title">게임 오버</p>
            <p class="game-over-message">재시작 버튼을 눌러 다시 시작하세요.</p>
          </div>
        </div>
      </section>

      <aside class="side-panel">
        <div class="score-panel">
          <h2>점수</h2>
          <p id="score" class="score-value">0</p>
        </div>

        <div class="button-panel">
          <button id="start-btn" type="button">시작</button>
          <button id="restart-btn" type="button">재시작</button>
        </div>

        <div class="controls-panel">
          <h2>조작법</h2>
          <p class="controls-note">게임 시작 후 키보드로 조작합니다.</p>
          <ul>
            <li><kbd>←</kbd> 왼쪽 이동</li>
            <li><kbd>→</kbd> 오른쪽 이동</li>
            <li><kbd>↓</kbd> 한 칸 빠르게 내리기</li>
            <li><kbd>↑</kbd> 블록 회전</li>
            <li><kbd>Space</kbd> 바닥까지 즉시 낙하</li>
          </ul>
        </div>
      </aside>
    </main>
  </div>

  <script src="script.js"></script>
</body>
</html>
